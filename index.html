<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>مدد | MADDAD</title>

  <!-- ربط ملف الستايل -->
  <link rel="stylesheet" href="pages/style.css" />

</head>

<body class="landing-body">

  <div class="landing-page-wrap">

    <div class="landing-main-card">

      <!-- الشعار -->
      <img src="pictures/logo.png" class="landing-logo" alt="شعار مدد" />

      <!-- العنوان -->
      <h1 class="landing-title">مرحباً بكم في تطبيق مدد</h1>

      <!-- النص -->
      <p class="landing-text">
        هلا والله! مع مدد نساعدك تتابع نمو طفلكم ونكتشف احتياجاته خطوة بخطوة.
      </p>

      <!-- الأزرار -->
      <div class="landing-role-grid">

        <button class="landing-role-card parent-card" onclick="goParent()">
          <div class="landing-role-text">
            <h3>ولي الأمر</h3>
            <p>الدخول لإدارة الحساب والاستبيان</p>
          </div>
        </button>

        <button class="landing-role-card child-card" onclick="goChild()">
          <div class="landing-role-text">
            <h3>الطفل</h3>
            <p>الدخول إلى صفحة الألعاب</p>
          </div>
        </button>

      </div>

    </div>

  </div>

  <!-- ربط الجافاسكربت -->
  <script src="pages/script.js"></script>

</body>
</html>
